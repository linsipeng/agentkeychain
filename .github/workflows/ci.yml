name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build single binary
        run: bun run build

      - name: Smoke test the binary
        run: |
          chmod +x bin/agentkeychain-bin
          ./bin/agentkeychain-bin --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentkeychain-linux-x64
          path: bin/agentkeychain-bin
          if-no-files-found: error